name: Build CastTV APK

on:
  workflow_dispatch:
  push:
    branches: [ "main", "master" ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: gradle

      # 1. 自动补全基础构建环境
      - name: Regenerate Gradle Wrapper
        run: gradle wrapper --gradle-version 8.5

      # 2. 强行注入 AndroidX 全局迁移开关
      - name: Enable AndroidX in gradle.properties
        run: |
          echo "android.useAndroidX=true" >> gradle.properties
          echo "android.enableJetifier=true" >> gradle.properties

      # 3. 核心大招：进行彻底的用户代理伪装，从官方权威底层存储池拉取真正的 .jar 实体包（多源轮询保护）
      - name: Download Real Cling Jars Securely
        run: |
          mkdir -p app/libs
          
          # 策略 A：使用完美的独立安全代理头直接从 Maven 官方冷存根分支和全球插件节点拉取物理流
          curl -L -A "Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36" -o app/libs/cling-core-2.1.2.jar https://repo1.maven.org/maven2/org/fourthline/cling/cling-core/2.1.2/cling-core-2.1.2.jar
          curl -L -A "Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36" -o app/libs/cling-support-2.1.2.jar https://repo1.maven.org/maven2/org/fourthline/cling/cling-support/2.1.2/cling-support-2.1.2.jar
          
          echo "--- 第一轮拉取包大小校验 ---"
          ls -lh app/libs/
          
          # 策略 B：如果发现包大小依然不对（低于 50KB 则必为假网页拦截），立刻启动全球高校和公共历史归档镜像（JCenter遗产永久镜像）
          if [ $(stat -c%s "app/libs/cling-core-2.1.2.jar") -lt 50000 ]; then
            echo "第一源拦截，正在从全球遗产冷备中心抢救性拉取实体依赖..."
            curl -L -A "Mozilla/5.0" -o app/libs/cling-core-2.1.2.jar https://jcenter.bintray.com/org/fourthline/cling/cling-core/2.1.2/cling-core-2.1.2.jar
            curl -L -A "Mozilla/5.0" -o app/libs/cling-support-2.1.2.jar https://jcenter.bintray.com/org/fourthline/cling/cling-support/2.1.2/cling-support-2.1.2.jar
            echo "--- 归档源抢救性大小校验 ---"
            ls -lh app/libs/
          fi
          
          # 策略 C：终极兜底，如果是全网高版本 Gradle 安全策略拦截了本地下载，我们利用华为云/腾讯云历史全量同步快照
          if [ $(stat -c%s "app/libs/cling-core-2.1.2.jar") -lt 50000 ]; then
            echo "启动最后的公共快照实体覆盖..."
            curl -L -o app/libs/cling-core-2.1.2.jar https://mirrors.huaweicloud.com/repository/maven/org/fourthline/cling/cling-core/2.1.2/cling-core-2.1.2.jar
            curl -L -o app/libs/cling-support-2.1.2.jar https://mirrors.huaweicloud.com/repository/maven/org/fourthline/cling/cling-support/2.1.2/cling-support-2.1.2.jar
            ls -lh app/libs/
          fi

      # 4. 强制项目绕过网络依赖，闭着眼睛直接吞掉本地 app/libs 下拉取到的两个实体包
      - name: Patch Build Gradle to use Local Jars
        run: |
          if [ -f "app/build.gradle.kts" ]; then
            sed -i '/org.fourthline.cling/d' app/build.gradle.kts
            sed -i '/dependencies {/a \    implementation(fileTree(mapOf("dir" to "libs", "include" to listOf("*.jar"))))' app/build.gradle.kts
          fi

      # 5. 覆盖并替换原本结构彻底写崩的 activity_main.xml
      - name: Re-write activity_main.xml perfectly
        run: |
          LAYOUT_FILE="app/src/main/res/layout/activity_main.xml"
          mkdir -p app/src/main/res/layout
          
          cat << 'EOF' > $LAYOUT_FILE
          <?xml version="1.0" encoding="utf-8"?>
          <androidx.constraintlayout.widget.ConstraintLayout 
              xmlns:android="http://schemas.android.com/apk/res/android"
              xmlns:app="http://schemas.android.com/apk/res-auto"
              android:layout_width="match_parent"
              android:layout_height="match_parent"
              android:background="#F5F5F7">

              <TextView
                  android:id="@+id/tvTitle"
                  android:layout_width="wrap_content"
                  android:layout_height="wrap_content"
                  android:text="红果短剧投屏助手"
                  android:textSize="20sp"
                  android:textStyle="bold"
                  android:textColor="#333333"
                  android:layout_marginTop="28dp"
                  app:layout_constraintTop_toTopOf="parent"
                  app:layout_constraintStart_toStartOf="parent"
                  app:layout_constraintEnd_toEndOf="parent" />

              <Button
                  android:id="@+id/btnStartService"
                  android:layout_width="0dp"
                  android:layout_height="wrap_content"
                  android:text="启动监听服务"
                  android:layout_marginHorizontal="32dp"
                  android:layout_marginTop="32dp"
                  app:layout_constraintTop_toBottomOf="@id/tvTitle"
                  app:layout_constraintStart_toStartOf="parent"
                  app:layout_constraintEnd_toEndOf="parent" />

              <Button
                  android:id="@+id/btnScanDevices"
                  android:layout_width="0dp"
                  android:layout_height="wrap_content"
                  android:text="扫描电视设备"
                  android:layout_marginHorizontal="32dp"
                  android:layout_marginTop="16dp"
                  app:layout_constraintTop_toBottomOf="@id/btnStartService"
                  app:layout_constraintStart_toStartOf="parent"
                  app:layout_constraintEnd_toEndOf="parent" />

              <Button
                  android:id="@+id/btnStopCast"
                  android:layout_width="0dp"
                  android:layout_height="wrap_content"
                  android:text="停止投屏"
                  android:layout_marginHorizontal="32dp"
                  android:layout_marginTop="16dp"
                  app:layout_constraintTop_toBottomOf="@id/btnScanDevices"
                  app:layout_constraintStart_toStartOf="parent"
                  app:layout_constraintEnd_toEndOf="parent" />

              <TextView
                  android:id="@+id/tvInstructions"
                  android:layout_width="0dp"
                  android:layout_height="wrap_content"
                  android:text="使用说明：\n1. 点击&quot;启动监听服务&quot;\n2. 打开红果短剧播放视频\n3. 自动提取视频URL后点击&quot;扫描设备&quot;\n4. 选择电视设备并开始投屏"
                  android:textSize="13sp"
                  android:textColor="#666666"
                  android:lineSpacingMultiplier="1.3"
                  android:padding="16dp"
                  android:layout_marginHorizontal="32dp"
                  android:layout_marginTop="24dp"
                  app:layout_constraintTop_toBottomOf="@id/btnStopCast"
                  app:layout_constraintStart_toStartOf="parent"
                  app:layout_constraintEnd_toEndOf="parent"
                  app:layout_constraintBottom_toBottomOf="parent" />

          </androidx.constraintlayout.widget.ConstraintLayout>
          EOF
          echo "--- 智能覆盖复写完成 ---"

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      # 6. 正式一键云端打包
      - name: Build with Gradle
        run: ./gradlew assembleDebug assembleRelease

      # 7. 提取产物发送到打包面板
      - name: Upload APK Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: CastTV-DLNA-APKs
          path: |
            app/build/outputs/apk/debug/*.apk
            app/build/outputs/apk/release/*.apk
