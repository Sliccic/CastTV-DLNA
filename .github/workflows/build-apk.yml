name: Build CastTV APK

on:
  workflow_dispatch:
  push:
    branches: [ "main", "master" ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: gradle

      # 1. 自动补全“启动钥匙”
      - name: Regenerate Gradle Wrapper
        run: gradle wrapper --gradle-version 8.5

      # 2. 强行注入 AndroidX 全局开关
      - name: Enable AndroidX in gradle.properties
        run: |
          echo "android.useAndroidX=true" >> gradle.properties
          echo "android.enableJetifier=true" >> gradle.properties

      # 3. 核心修复：建立本地 libs 文件夹，绕过崩溃的远端仓库，直接强行下载核心 Cling 依赖包
      - name: Download Cling Jars to Local Libs
        run: |
          mkdir -p app/libs
          # 从目前完全可靠的开源镜像源/冷存储节点直接抓取 cling-core 和 cling-support 的 jar 包
          curl -L -o app/libs/cling-core-2.1.2.jar https://repo.maven.apache.org/maven2/org/fourthline/cling/cling-core/2.1.2/cling-core-2.1.2.jar || curl -L -o app/libs/cling-core-2.1.2.jar https://plugins.gradle.org/m2/org/fourthline/cling/cling-core/2.1.2/cling-core-2.1.2.jar
          curl -L -o app/libs/cling-support-2.1.2.jar https://repo.maven.apache.org/maven2/org/fourthline/cling/cling-support/2.1.2/cling-support-2.1.2.jar || curl -L -o app/libs/cling-support-2.1.2.jar https://plugins.gradle.org/m2/org/fourthline/cling/cling-support/2.1.2/cling-support-2.1.2.jar
          ls -l app/libs/

      # 4. 强制项目直接依赖本地的这两个 Jar 包，而不是去网络上找
      - name: Patch Build Gradle to use Local Jars
        run: |
          if [ -f "app/build.gradle.kts" ]; then
            # 移除原有的远端 cling 依赖声明，替换为依赖本地整个 libs 目录
            sed -i '/org.fourthline.cling/d' app/build.gradle.kts
            # 确保里面包含 implementation(fileTree(mapOf("dir" to "libs", "include" to listOf("*.jar")))) 类似逻辑
            # 最暴力的做法是直接在 dependencies 块追加
            sed -i '/dependencies {/a \    implementation(fileTree(mapOf("dir" to "libs", "include" to listOf("*.jar"))))' app/build.gradle.kts
          fi

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      # 5. 执行编译
      - name: Build with Gradle
        run: ./gradlew assembleDebug assembleRelease

      # 6. 上传编译好的 APK
      - name: Upload APK Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: CastTV-DLNA-APKs
          path: |
            app/build/outputs/apk/debug/*.apk
            app/build/outputs/apk/release/*.apk
