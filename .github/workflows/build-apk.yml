name: Build CastTV APK

on:
  workflow_dispatch: # 允许你在网页上点击按钮手动触发编译
  push:
    branches: [ "main", "master" ] # 当你提交代码到 main 或 master 分支时自动编译

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      # 1. 拉取仓库代码
      - name: Checkout code
        uses: actions/checkout@v4

      # 2. 配置 Java 环境 (根据 README 要求的 Gradle 8.5，我们选用 JDK 17)
      - name: set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: gradle

      # 3. 赋予 Gradle 脚本执行权限
      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      # 4. 执行编译 (同时编译 Debug 和 Release 版本)
      - name: Build with Gradle
        run: ./gradlew assembleDebug assembleRelease

      # 5. 将编译好的 APK 提取并上传到 GitHub 云端供你下载
      - name: Upload APK Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: CastTV-DLNA-APKs
          path: |
            app/build/outputs/apk/debug/*.apk
            app/build/outputs/apk/release/*.apk
