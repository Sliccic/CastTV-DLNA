name: Build CastTV APK

on:
  workflow_dispatch:
    inputs:
      trigger:
        description: 'Manual trigger Build'
        required: false
        default: 'run'
  push:
    branches: [ "main", "master" ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: gradle

      # 1. 自动补全基础构建环境
      - name: Regenerate Gradle Wrapper
        run: gradle wrapper --gradle-version 8.5

      # 2. 强行注入 AndroidX 全局迁移开关
      - name: Enable AndroidX in gradle.properties
        run: |
          echo "android.useAndroidX=true" >> gradle.properties
          echo "android.enableJetifier=true" >> gradle.properties

      # 3. 核心大招：由于官方原版 Jar 下架，我们直接在项目的配置劫持中，强行向 settings.gradle.kts
      # 动态追加第三方志愿者在 JitPack 完美归档备份的 4thline Cling 二进制全量平替映射仓库，彻底根除包丢失问题！
      - name: Inject Reliable Mirror Repository
        run: |
          if [ -f "settings.gradle.kts" ]; then
            # 找到 mavenCentral() 并在其后插入包含 Cling 镜像的全量仓库，彻底复活三方坐标
            sed -i '/mavenCentral()/a \        maven { url = java.net.URI("https://jitpack.io") }\n        maven { url = java.net.URI("https://repo.clojars.org") }' settings.gradle.kts
          fi
          # 同时清理上两轮实验生成的临时 libs 包，完全还原构建纯净度
          rm -rf app/libs/*

      # 4. 图标自动补全以及强杀 AAPT 资源颜色编译报错
      - name: Patch AAPT Vector and Icon Configs
        run: |
          VECTOR_FILE="app/src/main/res/drawable/ic_launcher.xml"
          if [ -f "$VECTOR_FILE" ]; then
            sed -i 's/fillColor="none"/fillColor="#00000000"/g' $VECTOR_FILE
          fi
          
          # 将找不到图标文件的属性强制指向 Android 系统的内置通用安全占位图
          MANIFEST_FILE="app/src/main/AndroidManifest.xml"
          if [ -f "$MANIFEST_FILE" ]; then
            sed -i 's/android:icon="@mipmap\/ic_launcher"/android:icon="@android:drawable\/sym_def_app_icon"/g' $MANIFEST_FILE
            sed -i 's/android:roundIcon="@mipmap\/ic_launcher_round"//g' $MANIFEST_FILE
          fi

      # 5. 精准复写 activity_main.xml：100% 完整继承并对齐原作者 MainActivity 后台绑定的每一个专属 ID 节点
      # 杜绝任何 Unresolved reference UI 报错
      - name: Re-write activity_main.xml Coaligned with Backend
        run: |
          LAYOUT_FILE="app/src/main/res/layout/activity_main.xml"
          mkdir -p app/src/main/res/layout
          
          cat << 'EOF' > $LAYOUT_FILE
          <?xml version="1.0" encoding="utf-8"?>
          <androidx.constraintlayout.widget.ConstraintLayout 
              xmlns:android="http://schemas.android.com/apk/res/android"
              xmlns:app="http://schemas.android.com/apk/res-auto"
              android:layout_width="match_parent"
              android:layout_height="match_parent"
              android:background="#F5F5F7">

              <TextView
                  android:id="@+id/tvTitle"
                  android:layout_width="wrap_content"
                  android:layout_height="wrap_content"
                  android:text="红果短剧投屏助手"
                  android:textSize="20sp"
                  android:textStyle="bold"
                  android:textColor="#333333"
                  android:layout_marginTop="24dp"
                  app:layout_constraintTop_toTopOf="parent"
                  app:layout_constraintStart_toStartOf="parent"
                  app:layout_constraintEnd_toEndOf="parent" />

              <TextView
                  android:id="@+id/tvServiceStatus"
                  android:layout_width="wrap_content"
                  android:layout_height="wrap_content"
                  android:text="服务状态：未启动"
                  android:textColor="#E53935"
                  android:textSize="14sp"
                  android:layout_marginTop="12dp"
                  app:layout_constraintTop_toBottomOf="@id/tvTitle"
                  app:layout_constraintStart_toStartOf="parent"
                  app:layout_constraintEnd_toEndOf="parent" />

              <Button
                  android:id="@+id/btnToggleService"
                  android:layout_width="0dp"
                  android:layout_height="wrap_content"
                  android:text="启动监听服务"
                  android:layout_marginHorizontal="32dp"
                  android:layout_marginTop="16dp"
                  app:layout_getLayout_constraintTop_toBottomOf="@id/tvServiceStatus"
                  app:layout_constraintTop_toBottomOf="@id/tvServiceStatus"
                  app:layout_constraintStart_toStartOf="parent"
                  app:layout_constraintEnd_toEndOf="parent" />

              <TextView
                  android:id="@+id/tvVideoUrl"
                  android:layout_width="0dp"
                  android:layout_height="wrap_content"
                  android:text="暂未检测到红果短剧播放链接"
                  android:textColor="#666666"
                  android:textSize="13sp"
                  android:background="#EEEEEE"
                  android:padding="8dp"
                  android:layout_marginHorizontal="32dp"
                  android:layout_marginTop="12dp"
                  app:layout_constraintTop_toBottomOf="@id/btnToggleService"
                  app:layout_constraintStart_toStartOf="parent"
                  app:layout_constraintEnd_toEndOf="parent" />

              <Button
                  android:id="@+id/btnCastControl"
                  android:layout_width="0dp"
                  android:layout_height="wrap_content"
                  android:text="开始/停止投屏控制"
                  android:layout_marginHorizontal="32dp"
                  android:layout_marginTop="12dp"
                  app:layout_constraintTop_toBottomOf="@id/tvVideoUrl"
                  app:layout_constraintStart_toStartOf="parent"
