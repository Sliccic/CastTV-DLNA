name: Build CastTV APK

on:
  workflow_dispatch:
  push:
    branches: [ "main", "master" ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: gradle

      # 1. 自动补全“启动钥匙”
      - name: Regenerate Gradle Wrapper
        run: gradle wrapper --gradle-version 8.5

      # 2. 强行注入 AndroidX 全局开关
      - name: Enable AndroidX in gradle.properties
        run: |
          echo "android.useAndroidX=true" >> gradle.properties
          echo "android.enableJetifier=true" >> gradle.properties

      # 3. 物理外挂：下载核心 Cling 依赖包
      - name: Download Cling Jars to Local Libs
        run: |
          mkdir -p app/libs
          curl -L -o app/libs/cling-core-2.1.2.jar https://repo.maven.apache.org/maven2/org/fourthline/cling/cling-core/2.1.2/cling-core-2.1.2.jar || curl -L -o app/libs/cling-core-2.1.2.jar https://plugins.gradle.org/m2/org/fourthline/cling/cling-core/2.1.2/cling-core-2.1.2.jar
          curl -L -o app/libs/cling-support-2.1.2.jar https://repo.maven.apache.org/maven2/org/fourthline/cling/cling-support/2.1.2/cling-support-2.1.2.jar || curl -L -o app/libs/cling-support-2.1.2.jar https://plugins.gradle.org/m2/org/fourthline/cling/cling-support/2.1.2/cling-support-2.1.2.jar

      # 4. 强制项目依赖本地 Jar 包
      - name: Patch Build Gradle to use Local Jars
        run: |
          if [ -f "app/build.gradle.kts" ]; then
            sed -i '/org.fourthline.cling/d' app/build.gradle.kts
            sed -i '/dependencies {/a \    implementation(fileTree(mapOf("dir" to "libs", "include" to listOf("*.jar"))))' app/build.gradle.kts
          fi

      # 5. 精准修复：解决 TextView 闭合，并暴力降维修复缺失的 ConstraintLayout 闭合标签
      - name: Deep Fix XML Structure Errors
        run: |
          LAYOUT_FILE="app/src/main/res/layout/activity_main.xml"
          if [ -f "$LAYOUT_FILE" ]; then
            echo "--- 执行布局文件结构智能容错修复 ---"
            
            # 先执行上一轮成功的 TextView 精准闭合
            sed -i 's/layout_constraintEnd_toEndOf="parent"/layout_constraintEnd_toEndOf="parent" \/>/g' $LAYOUT_FILE
            
            # 清理因上一步可能重复生成的错位闭合符号（做一层去重防错）
            sed -i 's/\/> \/>/\/>/g' $LAYOUT_FILE
            
            # 解决 ConstraintLayout 缺失闭合标签的终极手段：
            # 现代 Android 布局文件最后一行通常是总闭合（如 </layout>），我们在总闭合上方强行补齐缺失的内部容器尾巴
            # 先移除可能写错位的零散闭合，直接在倒数第二行强行追加闭合，确保结构树能够强制收尾
            if grep -q "</layout>" $LAYOUT_FILE; then
              sed -i '/<\/layout>/i \    <\/androidx.constraintlayout.widget.ConstraintLayout>' $LAYOUT_FILE
            else
              # 如果没有 data binding 的外层 layout 标签，则在文件最后追加
              echo "</androidx.constraintlayout.widget.ConstraintLayout>" >> $LAYOUT_FILE
            fi
            
            echo "--- 修复完成，打印文件末尾 20 行验证结构 ---"
            tail -n 20 $LAYOUT_FILE
          fi

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      # 6. 执行编译
      - name: Build with Gradle
        run: ./gradlew assembleDebug assembleRelease

      # 7. 上传编译好的 APK
      - name: Upload APK Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: CastTV-DLNA-APKs
          path: |
            app/build/outputs/apk/debug/*.apk
            app/build/outputs/apk/release/*.apk
